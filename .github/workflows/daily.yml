name: daily-market-scan

on:
  schedule:
    - cron: "0 21 * * *"   # JST 6:00
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -e .

      - name: Run daily scan
        env:
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/run_daily.py

      - name: Commit data & report
        run: |
          git config user.name "market-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data reports
          git diff --cached --quiet || git commit -m "daily scan $(date -u +%F)"
          git push
